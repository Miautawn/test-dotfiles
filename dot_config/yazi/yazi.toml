[mgr]
ratio          = [ 0, 4, 4 ]
sort_by        = "alphabetical"
sort_dir_first = true
linemode       = "none"
show_symlink   = true


[preview]
wrap            = "yes"

[open]
prepend_rules = [
	{ mime = "video/*", use = "play"}
]

[opener]
play = [
	{ run = "mpv %s", orphan = true, for = "unix"}
]
