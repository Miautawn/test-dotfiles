backend = "xrender";
vsync = false;
use-damage = true;

# Disable all resource-heavy processes
fading = false;
corner-radius = 0;
blur-background = false;

# Keep only the tight shadow and the critical herbstluftwm exclusions
shadow = true;
shadow-radius = 10;          # The thickness of your outer outline (set to 1 or 2)
shadow-opacity = 1.0;       # 1.0 removes the gradient entirely, making it 100% solid

# CRITICAL: Negative offsets equal to the radius center the line perfectly.
# This ensures it hugs the Left, Right, Top, and Bottom identically.
shadow-offset-x = -10;       
shadow-offset-y = -10;

shadow-color = "#000000";

shadow-exclude = [
    "class_g = '_HERBST_FRAME'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_HIDDEN'",
    "_NET_WM_STATE@:32a *= '_NET_WM_STATE_MODAL'",
    "class_g = 'Rofi'",
    "class_g = 'Polybar'",
    "class_g = 'Dunst'",
    "window_type = 'dialog'",
    "window_type = 'utility'",
    "window_type = 'popup_menu'",
    "window_type = 'dropdown_menu'",
    "window_type = 'menu'"
];
